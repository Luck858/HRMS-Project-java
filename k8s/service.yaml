apiVersion: v1
kind: Service
metadata:
  name: hrms-service
  namespace: default
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/"
spec:
  type: LoadBalancer
  selector:
    app: hrms
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
